<div class="row justify-content-center text-center py-5">
  <div class="col-12 col-md-10">
    <h1 class="hero-title font-weight-bold display-4 mb-4" style="font-family: 'Outfit', sans-serif; letter-spacing: -0.03em;">
      {{ with .page.Title }}{{ . | markdownify | emojify }}{{ end }}
    </h1>
    {{ with .page.Content }}
    <div class="hero-lead lead text-muted mb-4" style="font-size: 1.4rem; line-height: 1.6;">{{ . }}</div>
    {{ end }}
    {{ range .page.Params.cta }}
    <a href="{{ .url }}" class="btn btn-primary btn-lg px-4 py-3 font-weight-bold shadow-sm" style="border-radius: 8px;">{{ .label }}</a>
    {{ end }}
  </div>
</div>
